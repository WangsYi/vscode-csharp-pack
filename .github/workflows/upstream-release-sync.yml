name: Sync Upstream Version Tag

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Optional upstream tag to sync, for example v2.95.0'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: upstream-release-sync
  cancel-in-progress: false

env:
  TARGET_BRANCH: main
  UPSTREAM_OWNER: dotnet
  UPSTREAM_REPO: vscode-csharp
  SYNC_WORKFLOW_FILE: .github/workflows/upstream-release-sync.yml
  PACKAGE_WORKFLOW_FILE: .github/workflows/upstream-release-package.yml
  OFFLINE_PACKAGING_TASK_FILE: tasks/packaging/offlinePackagingTasks.ts
  DOTNET_RUNTIME_RESOLVER_FILE: src/lsptoolshost/dotnetRuntime/dotnetRuntimeExtensionResolver.ts
  BLAZOR_DEBUG_PROVIDER_FILE: src/razor/src/blazorDebug/blazorDebugConfigurationProvider.ts

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      upstream_tag: ${{ steps.resolve.outputs.upstream_tag }}
    steps:
      - name: Resolve upstream version tag
        id: resolve
        uses: actions/github-script@v7
        env:
          INPUT_TAG: ${{ github.event.inputs.upstream_tag }}
          UPSTREAM_OWNER: ${{ env.UPSTREAM_OWNER }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            function isVersionTag(tag) {
              return /^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(tag);
            }

            function parseVersion(tag) {
              const value = tag.slice(1);
              const [core, prerelease = ''] = value.split('-', 2);
              const [major, minor, patch] = core.split('.').map((part) => Number.parseInt(part, 10));
              return { tag, major, minor, patch, prerelease };
            }

            function compareIdentifiers(left, right) {
              const leftNumeric = /^\d+$/.test(left);
              const rightNumeric = /^\d+$/.test(right);

              if (leftNumeric && rightNumeric) {
                return Number(left) - Number(right);
              }

              if (leftNumeric) {
                return -1;
              }

              if (rightNumeric) {
                return 1;
              }

              return left.localeCompare(right);
            }

            function compareVersionsDesc(leftTag, rightTag) {
              const left = parseVersion(leftTag);
              const right = parseVersion(rightTag);

              for (const key of ['major', 'minor', 'patch']) {
                if (left[key] !== right[key]) {
                  return right[key] - left[key];
                }
              }

              if (!left.prerelease && right.prerelease) {
                return -1;
              }

              if (left.prerelease && !right.prerelease) {
                return 1;
              }

              if (!left.prerelease && !right.prerelease) {
                return 0;
              }

              const leftParts = left.prerelease.split('.');
              const rightParts = right.prerelease.split('.');
              const maxLength = Math.max(leftParts.length, rightParts.length);

              for (let index = 0; index < maxLength; index++) {
                const leftPart = leftParts[index];
                const rightPart = rightParts[index];

                if (leftPart === undefined) {
                  return -1;
                }

                if (rightPart === undefined) {
                  return 1;
                }

                const compared = compareIdentifiers(leftPart, rightPart);
                if (compared !== 0) {
                  return compared;
                }
              }

              return 0;
            }

            const inputTag = process.env.INPUT_TAG?.trim();
            let upstreamTag = inputTag;

            if (!upstreamTag) {
              const tags = await github.paginate(github.rest.repos.listTags, {
                owner: process.env.UPSTREAM_OWNER,
                repo: process.env.UPSTREAM_REPO,
                per_page: 100,
              });

              const versionTags = tags
                .map((tag) => tag.name)
                .filter((tag) => isVersionTag(tag))
                .sort(compareVersionsDesc);

              if (versionTags.length === 0) {
                core.setFailed('No upstream version tag was found.');
                return;
              }

              for (const candidateTag of versionTags) {
                try {
                  await github.rest.git.getRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${candidateTag}`,
                  });
                } catch (error) {
                  if (error.status === 404) {
                    upstreamTag = candidateTag;
                    break;
                  }

                  throw error;
                }
              }

              if (!upstreamTag) {
                core.info('No new upstream version tag to sync.');
                core.setOutput('should_run', 'false');
                return;
              }

              core.info(`Latest missing upstream version tag: ${upstreamTag}`);
            } else {
              core.info(`Using manually provided upstream tag: ${upstreamTag}`);
            }

            if (!isVersionTag(upstreamTag)) {
              core.setFailed(`Tag ${upstreamTag} does not match the supported version format.`);
              return;
            }

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${upstreamTag}`,
              });

              core.info(`Tag ${upstreamTag} already exists in this repository, skipping.`);
              core.setOutput('should_run', 'false');
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              core.setOutput('should_run', 'true');
            }

            core.setOutput('upstream_tag', upstreamTag);

  sync:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync workspace to upstream tag
        env:
          UPSTREAM_TAG: ${{ needs.resolve-tag.outputs.upstream_tag }}
        run: |
          git fetch "https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git" --tags --force
          git rev-parse --verify "refs/tags/${UPSTREAM_TAG}^{commit}" >/dev/null

          temp_dir="$(mktemp -d)"
          git archive "refs/tags/${UPSTREAM_TAG}" | tar -xf - -C "${temp_dir}"

          rsync -a --delete \
            --exclude ".git/" \
            --exclude "${SYNC_WORKFLOW_FILE}" \
            --exclude "${PACKAGE_WORKFLOW_FILE}" \
            --exclude "${OFFLINE_PACKAGING_TASK_FILE}" \
            --exclude "${DOTNET_RUNTIME_RESOLVER_FILE}" \
            --exclude "${BLAZOR_DEBUG_PROVIDER_FILE}" \
            "${temp_dir}/" "${GITHUB_WORKSPACE}/"

      - name: Commit synced source
        id: commit
        env:
          UPSTREAM_TAG: ${{ needs.resolve-tag.outputs.upstream_tag }}
        run: |
          if [ -z "$(git status --short)" ]; then
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A
          git commit -m "chore: sync upstream release ${UPSTREAM_TAG}"
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "created_commit=true" >> "$GITHUB_OUTPUT"

      - name: Push upstream tag to this repository
        env:
          UPSTREAM_TAG: ${{ needs.resolve-tag.outputs.upstream_tag }}
        run: |
          git tag -f "${UPSTREAM_TAG}"
          git push origin "refs/tags/${UPSTREAM_TAG}"
