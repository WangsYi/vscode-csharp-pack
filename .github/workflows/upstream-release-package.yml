name: Package Offline VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Optional git ref to package, for example main or v2.95.0'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: upstream-release-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: msbuild/global.json

      - name: Install npm dependencies
        run: npm ci

      - name: Build offline VSIX packages
        run: npm run vsix:offline:package

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: offline-vsix-${{ github.ref_name || 'manual' }}
          path: |
            vsix/*.vsix
            vsix/*.manifest
          if-no-files-found: error
